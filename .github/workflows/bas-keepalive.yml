name: SAP BAS Keep-Alive

on:
  schedule:
    # 每天每 6 小时运行一次 (UTC 时间 0, 6, 12, 18 点)
    # 根据需要可以调整为 '0 */4 * * *' (每 4 小时)
    - cron: '0/30 * * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上点击 "Run workflow" 手动触发

jobs:
  bas-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 并行保活，单账号约3分钟
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Keep-Alive Script
        env:
          # 推荐方式：只设一个 ACCOUNTS secret，值为 JSON 数组
          # 示例值：[{"url":"https://xxx.cloud.sap","email":"a@b.com","password":"p1","wsid":"ws-1"},{"url":"https://yyy.cloud.sap","email":"c@d.com","password":"p2","wsid":"ws-2"}]
          # 可选加 "name" 字段作为账号别名
          ACCOUNTS: ${{ secrets.ACCOUNTS }}

          # 备选方式：逐行设置（适合 .env 文件，GitHub Actions 中需要设很多 secrets）
          BAS_URL_1: ${{ secrets.BAS_URL_1 }}
          BAS_EMAIL_1: ${{ secrets.BAS_EMAIL_1 }}
          BAS_PASSWORD_1: ${{ secrets.BAS_PASSWORD_1 }}
          BAS_WSID_1: ${{ secrets.BAS_WSID_1 }}

          # 单账号回退
          BAS_URL: ${{ secrets.BAS_URL }}
          BAS_EMAIL: ${{ secrets.BAS_EMAIL }}
          BAS_PASSWORD: ${{ secrets.BAS_PASSWORD }}
          BAS_WSID: ${{ secrets.BAS_WSID }}
        run: node keepalive.js

      - name: Upload Artifacts (Screenshots)
        if: always() # 无论成功还是失败，都上传截图供检查
        uses: actions/upload-artifact@v4
        with:
          name: execution-results
          path: /tmp/bas-*.png
          retention-days: 3
