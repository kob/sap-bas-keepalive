name: BAS Keepalive Daily

on:
  schedule:
      - cron: '28 10 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BAS_EMAIL: ${{ secrets.BAS_EMAIL }}
      BAS_PASSWORD: ${{ secrets.BAS_PASSWORD }}
      BAS_URL: ${{ secrets.BAS_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      # 👇 建议添加：缓存 Playwright 的浏览器二进制文件
      - name: Cache Playwright bins
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install playwright
          # 如果有 package.json，建议用 npm ci 或 npm install
          # npx playwright install chromium # 通常 npm install 后这步是自动的，显式运行也无妨
      
      - name: Run keepalive script
        run: node keepalive.js
