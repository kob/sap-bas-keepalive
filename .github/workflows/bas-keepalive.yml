name: SAP BAS Keep-Alive

on:
  schedule:
    # 每天每 6 小时运行一次 (UTC 时间 0, 6, 12, 18 点)
    # 根据需要可以调整为 '0 */4 * * *' (每 4 小时)
    - cron: '0/30 * * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上点击 "Run workflow" 手动触发

jobs:
  bas-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 防止脚本卡死占用额度
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Keep-Alive Script
        env:
          # 从 GitHub Secrets 读取加密变量
          BAS_URL: ${{ secrets.BAS_URL }}
          BAS_EMAIL: ${{ secrets.BAS_EMAIL }}
          BAS_PASSWORD: ${{ secrets.BAS_PASSWORD }}
          BAS_WSID: ${{ secrets.BAS_WSID }}
          # 强制无头模式（Actions 必须开启）
          HEADLESS: "true"
        run: node index.js

      - name: Upload Artifacts (Screenshots)
        if: always() # 无论成功还是失败，都上传截图供检查
        uses: actions/upload-artifact@v4
        with:
          name: execution-results
          path: /tmp/bas-*.png
          retention-days: 3
