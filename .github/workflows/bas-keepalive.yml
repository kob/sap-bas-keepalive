name: SAP BAS Keep-Alive

on:
  schedule:
    # 每天每 6 小时运行一次 (UTC 时间 0, 6, 12, 18 点)
    # 根据需要可以调整为 '0 */4 * * *' (每 4 小时)
    - cron: '0/30 * * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上点击 "Run workflow" 手动触发

jobs:
  bas-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 并行保活，单账号约3分钟
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Keep-Alive Script
        env:
          # 多账号模式：在 GitHub Secrets 中设置 BAS_URL_1, BAS_EMAIL_1, BAS_PASSWORD_1, BAS_WSID_1 等
          # 索引从 1 开始递增，脚本自动检测。未设置的会为空，脚本自动跳过。
          # 也可使用 BAS_NAME_1 等设置账号别名
          BAS_URL_1: ${{ secrets.BAS_URL_1 }}
          BAS_EMAIL_1: ${{ secrets.BAS_EMAIL_1 }}
          BAS_PASSWORD_1: ${{ secrets.BAS_PASSWORD_1 }}
          BAS_WSID_1: ${{ secrets.BAS_WSID_1 }}
          BAS_NAME_1: ${{ secrets.BAS_NAME_1 }}

          BAS_URL_2: ${{ secrets.BAS_URL_2 }}
          BAS_EMAIL_2: ${{ secrets.BAS_EMAIL_2 }}
          BAS_PASSWORD_2: ${{ secrets.BAS_PASSWORD_2 }}
          BAS_WSID_2: ${{ secrets.BAS_WSID_2 }}
          BAS_NAME_2: ${{ secrets.BAS_NAME_2 }}

          BAS_URL_3: ${{ secrets.BAS_URL_3 }}
          BAS_EMAIL_3: ${{ secrets.BAS_EMAIL_3 }}
          BAS_PASSWORD_3: ${{ secrets.BAS_PASSWORD_3 }}
          BAS_WSID_3: ${{ secrets.BAS_WSID_3 }}
          BAS_NAME_3: ${{ secrets.BAS_NAME_3 }}

          BAS_URL_4: ${{ secrets.BAS_URL_4 }}
          BAS_EMAIL_4: ${{ secrets.BAS_EMAIL_4 }}
          BAS_PASSWORD_4: ${{ secrets.BAS_PASSWORD_4 }}
          BAS_WSID_4: ${{ secrets.BAS_WSID_4 }}
          BAS_NAME_4: ${{ secrets.BAS_NAME_4 }}

          BAS_URL_5: ${{ secrets.BAS_URL_5 }}
          BAS_EMAIL_5: ${{ secrets.BAS_EMAIL_5 }}
          BAS_PASSWORD_5: ${{ secrets.BAS_PASSWORD_5 }}
          BAS_WSID_5: ${{ secrets.BAS_WSID_5 }}
          BAS_NAME_5: ${{ secrets.BAS_NAME_5 }}

          # 单账号模式（回退，如果没有设置 BAS_URL_1 则使用这些）
          BAS_URL: ${{ secrets.BAS_URL }}
          BAS_EMAIL: ${{ secrets.BAS_EMAIL }}
          BAS_PASSWORD: ${{ secrets.BAS_PASSWORD }}
          BAS_WSID: ${{ secrets.BAS_WSID }}
        run: node keepalive.js

      - name: Upload Artifacts (Screenshots)
        if: always() # 无论成功还是失败，都上传截图供检查
        uses: actions/upload-artifact@v4
        with:
          name: execution-results
          path: /tmp/bas-*.png
          retention-days: 3
